# FleetPilot — local development stack.
#
# Runnable today:  db (PostgreSQL + PostGIS), redis, ortools (optimization service).
# On first boot the database auto-loads database/schema.sql then database/seed_data.sql.
#
# The `backend` and `web` services are scaffolded apps; uncomment them once their
# Dockerfiles are added (see docs/07_DEPLOYMENT_GUIDE.md). Until then run them locally
# with `php artisan serve` and `npm run dev`.

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: fleetpilot-db
    environment:
      POSTGRES_DB: fleetpilot
      POSTGRES_USER: fleetpilot
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetpilot

  redis:
    image: redis:7-alpine
    container_name: fleetpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fleetpilot

  ortools:
    build:
      context: ./optimization
    container_name: fleetpilot-ortools
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - fleetpilot

  # backend:
  #   build: ./backend
  #   container_name: fleetpilot-app
  #   depends_on:
  #     db: { condition: service_healthy }
  #     redis: { condition: service_started }
  #   environment:
  #     - APP_ENV=local
  #   ports:
  #     - "8000:8000"
  #   networks:
  #     - fleetpilot

  # web:
  #   build: ./web
  #   container_name: fleetpilot-web
  #   depends_on:
  #     - backend
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - fleetpilot

volumes:
  db_data:
  redis_data:

networks:
  fleetpilot:
    driver: bridge
